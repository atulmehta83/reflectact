<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #161b22 0%, #1c2433 100%);
    border-bottom: 1px solid #30363d;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f0f6fc;
    letter-spacing: -0.3px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: #8b949e;
  }
  .header-meta a { font-size: 13px; }

  /* Summary Cards */
  .summary-row {
    display: flex;
    gap: 12px;
    padding: 20px 32px;
    flex-wrap: wrap;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px 22px;
    flex: 1;
    min-width: 130px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #58a6ff; }
  .card-value {
    font-size: 32px;
    font-weight: 700;
    color: #f0f6fc;
    line-height: 1.1;
  }
  .card-label {
    font-size: 12px;
    color: #8b949e;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card.high .card-value { color: #f85149; }
  .card.medium .card-value { color: #d29922; }
  .card.low .card-value { color: #3fb950; }
  .card.blocked .card-value { color: #f85149; }
  .card.stale .card-value { color: #d29922; }

  /* Filter Bar */
  .filter-bar {
    padding: 0 32px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar label {
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .filter-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: #58a6ff; color: #f0f6fc; }
  .filter-btn.active {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
  }
  .filter-count {
    margin-left: 12px;
    font-size: 13px;
    color: #8b949e;
  }

  /* Table Container */
  .table-wrap {
    padding: 0 32px 32px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #161b22;
    border-bottom: 2px solid #30363d;
    padding: 10px 10px;
    text-align: left;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #f0f6fc; }
  thead th .sort-arrow {
    margin-left: 4px;
    font-size: 10px;
    opacity: 0.4;
  }
  thead th.sorted .sort-arrow { opacity: 1; color: #58a6ff; }
  tbody tr {
    border-bottom: 1px solid #21262d;
    transition: background 0.1s;
  }
  tbody tr:hover { background: #161b22; }
  tbody td {
    padding: 9px 10px;
    vertical-align: top;
  }

  /* Risk icon */
  .risk-icon { font-size: 15px; }

  /* State badges */
  .state-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .state-Blocked { background: rgba(248,81,73,0.2); color: #f85149; }
  .state-Proposed { background: rgba(210,153,34,0.2); color: #d29922; }
  .state-Active { background: rgba(56,139,253,0.2); color: #388bfd; }
  .state-RollingOut { background: rgba(63,185,80,0.2); color: #3fb950; }

  /* Committed badges */
  .committed-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .committed-Committed { background: rgba(63,185,80,0.15); color: #3fb950; }
  .committed-Targeted { background: rgba(210,153,34,0.15); color: #d29922; }
  .committed-Proposed { background: rgba(248,81,73,0.15); color: #f85149; }
  .committed-HardCut { background: rgba(188,140,255,0.2); color: #bc8cff; }

  /* Shiproom dot */
  .shiproom-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .shiproom-Green { background: #3fb950; }
  .shiproom-Orange { background: #d29922; }
  .shiproom-Red { background: #f85149; }

  /* Days cell */
  .days-red { color: #f85149; font-weight: 700; }
  .days-orange { color: #d29922; font-weight: 600; }

  /* Risk signals */
  .risk-signal {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin: 1px 2px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .signal-blocked { background: rgba(248,81,73,0.2); color: #f85149; }
  .signal-proposed { background: rgba(210,153,34,0.2); color: #d29922; }
  .signal-stale { background: rgba(210,153,34,0.2); color: #d29922; }
  .signal-uncommitted { background: rgba(188,140,255,0.2); color: #bc8cff; }
  .signal-shiproom { background: rgba(210,153,34,0.2); color: #d29922; }

  /* Status tweet */
  .tweet-cell {
    max-width: 280px;
    font-size: 12px;
    color: #8b949e;
    line-height: 1.4;
  }
  .tweet-cell.empty { font-style: italic; color: #484f58; }

  /* Title cell */
  .title-cell {
    max-width: 320px;
    white-space: normal;
  }

  /* Owner cell */
  .owner-cell { white-space: nowrap; }

  /* Priority */
  .priority-1 { color: #f85149; font-weight: 700; }
  .priority-2 { color: #d29922; }
  .priority-3 { color: #8b949e; }

  /* Row risk highlight */
  tr.risk-high { border-left: 3px solid #f85149; }
  tr.risk-medium { border-left: 3px solid #d29922; }
  tr.risk-low { border-left: 3px solid transparent; }

  /* Responsive */
  @media (max-width: 900px) {
    .summary-row { padding: 12px 16px; }
    .filter-bar { padding: 0 16px 12px; }
    .table-wrap { padding: 0 16px 16px; }
    .header { padding: 16px; }
  }
</style>

const ADO_BASE = 'https://dev.azure.com/domoreexp/MSTeams/_workitems/edit/';

const COLUMNS = [
  { key: 'riskLevel', label: 'Risk', sortKey: d => d.riskCount },
  { key: 'id', label: 'ID', sortKey: d => d.id },
  { key: 'title', label: 'Title', sortKey: d => d.title.toLowerCase() },
  { key: 'state', label: 'State', sortKey: d => d.state },
  { key: 'priority', label: 'Pri', sortKey: d => d.priority },
  { key: 'committed', label: 'Committed', sortKey: d => d.committed || '' },
  { key: 'shiproom', label: 'Shiproom', sortKey: d => d.shiproom || '' },
  { key: 'assignedTo', label: 'Owner', sortKey: d => (d.assignedTo || '').toLowerCase() },
  { key: 'daysSinceUpdate', label: 'Days Stale', sortKey: d => d.daysSinceUpdate },
  { key: 'statusTweet', label: 'Status Tweet', sortKey: d => (d.statusTweet || '').toLowerCase() },
  { key: 'risks', label: 'Risk Signals', sortKey: d => d.riskCount }
];

let currentFilter = 'all';
let sortCol = 0;
let sortAsc = false; // default descending for risk

function riskLevel(d) {
  if (d.riskCount >= 2) return 'high';
  if (d.riskCount === 1) return 'medium';
  return 'low';
}

function riskIcon(d) {
  const l = riskLevel(d);
  if (l === 'high') return '🔴';
  if (l === 'medium') return '🟡';
  return '🟢';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSummary() {
  const total = DATA.length;
  const high = DATA.filter(d => d.riskCount >= 2).length;
  const med = DATA.filter(d => d.riskCount === 1).length;
  const low = DATA.filter(d => d.riskCount === 0).length;
  const blocked = DATA.filter(d => d.state === 'Blocked').length;
  const stale = DATA.filter(d => d.daysSinceUpdate >= 7).length;

  const cards = [
    { value: total, label: 'Total Features', cls: '' },
    { value: high, label: '🔴 High Risk (2+)', cls: 'high' },
    { value: med, label: '🟡 Medium Risk (1)', cls: 'medium' },
    { value: low, label: '🟢 Low Risk (0)', cls: 'low' },
    { value: blocked, label: 'Blocked', cls: 'blocked' },
    { value: stale, label: 'Stale (7+ days)', cls: 'stale' }
  ];

  document.getElementById('summaryRow').innerHTML = cards.map(c =>
    `<div class="card ${c.cls}"><div class="card-value">${c.value}</div><div class="card-label">${c.label}</div></div>`
  ).join('');
}

function filterData() {
  return DATA.filter(d => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'high') return d.riskCount >= 2;
    if (currentFilter === 'medium') return d.riskCount === 1;
    if (currentFilter === 'blocked') return d.state === 'Blocked';
    if (currentFilter === 'stale') return d.daysSinceUpdate >= 7;
    if (currentFilter === 'proposed') return d.state === 'Proposed';
    if (currentFilter === 'uncommitted') return d.committed === 'Proposed';
    return true;
  });
}

function sortData(data) {
  const col = COLUMNS[sortCol];
  const fn = col.sortKey;
  return [...data].sort((a, b) => {
    let va = fn(a), vb = fn(b);
    if (typeof va === 'string') {
      const cmp = va.localeCompare(vb);
      return sortAsc ? cmp : -cmp;
    }
    return sortAsc ? va - vb : vb - va;
  });
}

function renderHeaders() {
  const tr = document.getElementById('headerRow');
  tr.innerHTML = COLUMNS.map((col, i) => {
    const arrow = i === sortCol ? (sortAsc ? '▲' : '▼') : '⇅';
    const cls = i === sortCol ? 'sorted' : '';
    return `<th class="${cls}" onclick="onSort(${i})">${col.label} <span class="sort-arrow">${arrow}</span></th>`;
  }).join('');
}

function renderRiskSignals(risks) {
  if (!risks) return '';
  return risks.split(',').filter(Boolean).map(r =>
    `<span class="risk-signal signal-${r}">${r}</span>`
  ).join('');
}

function renderRow(d) {
  const level = riskLevel(d);
  const committedCls = d.committed === 'Hard Cut' ? 'HardCut' : (d.committed || '');
  const daysCls = d.daysSinceUpdate >= 14 ? 'days-red' : d.daysSinceUpdate >= 7 ? 'days-orange' : '';
  const tweet = d.statusTweet
    ? `<span class="tweet-cell">${escHtml(d.statusTweet)}</span>`
    : `<span class="tweet-cell empty">—</span>`;

  return `<tr class="risk-${level}">
    <td><span class="risk-icon">${riskIcon(d)}</span></td>
    <td><a href="${ADO_BASE}${d.id}" target="_blank">${d.id}</a></td>
    <td class="title-cell">${escHtml(d.title)}</td>
    <td><span class="state-badge state-${d.state}">${d.state}</span></td>
    <td><span class="priority-${d.priority}">P${d.priority}</span></td>
    <td><span class="committed-badge committed-${committedCls}">${escHtml(d.committed)}</span></td>
    <td><span class="shiproom-dot shiproom-${d.shiproom || 'Green'}"></span></td>
    <td class="owner-cell">${escHtml(d.assignedTo)}</td>
    <td class="${daysCls}">${d.daysSinceUpdate}d</td>
    <td>${tweet}</td>
    <td>${renderRiskSignals(d.risks)}</td>
  </tr>`;
}

function renderTable() {
  const filtered = filterData();
  const sorted = sortData(filtered);
  document.getElementById('tableBody').innerHTML = sorted.map(renderRow).join('');
  document.getElementById('filterCount').textContent = `Showing ${sorted.length} of ${DATA.length}`;
}

function onSort(colIndex) {
  if (sortCol === colIndex) {
    sortAsc = !sortAsc;
  } else {
    sortCol = colIndex;
    sortAsc = true;
  }
  renderHeaders();
  renderTable();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

// Initial render
renderSummary();
renderHeaders();
renderTable();
</script>
