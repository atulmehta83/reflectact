.tile.total .count{color:var(--accent)}
.tile.green .count{color:var(--green)}

// Build hierarchy from relations
function buildTree(){
  itemMap={};
  DATA.items.forEach(function(item){ itemMap[item.id]=item; });
  uberIds=[];
  childMap={};
  var seenRoots={};
  var seenChildren={};
  DATA.relations.forEach(function(rel){
    if(rel.source===0 && !seenRoots[rel.target]){
      seenRoots[rel.target]=true;
      uberIds.push(rel.target);
      if(!childMap[rel.target]) childMap[rel.target]=[];
    }
  });
  DATA.relations.forEach(function(rel){
    if(rel.source!==0 && childMap[rel.source]!==undefined){
      var key=rel.source+'-'+rel.target;
      if(!seenChildren[key]){
        seenChildren[key]=true;
        childMap[rel.source].push(rel.target);
      }
    }
  });
  uberIds.forEach(function(id){ if(expanded[id]===undefined) expanded[id]=true; });
  features=DATA.items.filter(function(i){ return i.type==='Feature'; });
}

buildTree();

(function(){
  renderTiles();
  fillAreas();
  renderHdr();
  renderRows();
  document.getElementById('ld').style.display='none';
  document.getElementById('tbl').style.display='';
})();

// --- Helpers ---
function gv(item,k){return mods[item.id]&&mods[item.id][k]!==undefined?mods[item.id][k]:item[k]}
function shipColor(item){return gv(item,'shiproom')||null}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// --- Expand / Collapse ---
function toggleUber(id){
  expanded[id]=!expanded[id];
  renderRows();
}
function toggleAll(){
  var allExp=uberIds.every(function(id){return expanded[id]});
  uberIds.forEach(function(id){expanded[id]=!allExp});
  renderRows();
}
function updateToggleBtn(){
  var btn=document.getElementById('expandBtn');
  if(!btn)return;
  var allExp=uberIds.every(function(id){return expanded[id]});
  btn.textContent=allExp?'Collapse All':'Expand All';
}

// --- Tiles (feature-count based) ---
function renderTiles(){
  var fs=features;
  var defs=[
    {c:'total',l:'Total Features',n:fs.length,f:'total'},
    {c:'green',l:'\uD83D\uDFE2 Green',n:fs.filter(function(x){return shipColor(x)==='Green'}).length,f:'green'},
    {c:'orange',l:'\uD83D\uDFE0 Orange',n:fs.filter(function(x){return shipColor(x)==='Orange'}).length,f:'orange'},
    {c:'red',l:'\uD83D\uDD34 Red',n:fs.filter(function(x){return shipColor(x)==='Red'}).length,f:'red'},
    {c:'gray',l:'\u26AA No Status',n:fs.filter(function(x){return !shipColor(x)}).length,f:'gray'},
    {c:'blocked',l:'Blocked',n:fs.filter(function(x){return gv(x,'state')==='Blocked'}).length,f:'blocked'},
    {c:'stale',l:'Stale (7d+)',n:fs.filter(function(x){return(gv(x,'risks')||'').includes('stale')}).length,f:'stale'},
    {c:'r0miss',l:'R0 Missing',n:fs.filter(function(x){return(gv(x,'risks')||'').includes('r0-missing')}).length,f:'r0miss'},
    {c:'r0over',l:'R0 Overdue',n:fs.filter(function(x){return(gv(x,'risks')||'').includes('r0-overdue')}).length,f:'r0over'},
  ];
  document.getElementById('tiles').innerHTML=defs.map(function(t){
    return '<div class="tile '+t.c+(activeTile===t.f?' active':'')+'" onclick="tileClick(\''+t.f+'\')">'
      +'<div class="count">'+t.n+'</div><div class="label">'+t.l+'</div></div>';
  }).join('');
}
function tileClick(f){activeTile=activeTile===f?null:f;renderTiles();applyFilters()}

// --- Area dropdown ---
function fillAreas(){
  var seen={}, as=[];
  DATA.items.forEach(function(i){
    if(i.areaPath&&!seen[i.areaPath]){seen[i.areaPath]=true;as.push(i.areaPath)}
  });
  as.sort();
  var sel=document.getElementById('areaSelect');
  as.forEach(function(a){var o=document.createElement('option');o.value=a;o.textContent=a.split('\\').pop();sel.appendChild(o)});
}

// --- Item filter check ---
function itemMatchesFilter(item){
  var srch=document.getElementById('searchBox').value.toLowerCase();
  var area=document.getElementById('areaSelect').value;
  var ok=true;
  if(ok&&activeTile) ok=passTile(item);
  if(ok&&area) ok=(gv(item,'areaPath')||'')===area;
  if(ok&&srch){
    var h=[gv(item,'title'),gv(item,'assignedTo'),String(item.id),gv(item,'statusTweet'),gv(item,'type')].join(' ').toLowerCase();
    ok=h.includes(srch);
  }
  return ok;
}

// --- Apply filters (tree-aware) ---
function applyFilters(){
  var vis=0;
  var hasFilter=activeTile!==null||document.getElementById('searchBox').value.trim()!==''||document.getElementById('areaSelect').value!=='';
  uberIds.forEach(function(uberId){
    var uberItem=itemMap[uberId];
    var children=(childMap[uberId]||[]).map(function(cid){return itemMap[cid]}).filter(Boolean);
    var uberMatch=uberItem?itemMatchesFilter(uberItem):false;
    var anyChildMatch=children.some(function(c){return itemMatchesFilter(c)});
    var showUber=!hasFilter||(uberMatch||anyChildMatch);
    var uberRow=document.querySelector('tr[data-uber="'+uberId+'"]');
    if(uberRow){
      uberRow.classList.toggle('hid',!showUber);
      if(showUber) vis++;
    }
    children.forEach(function(child){
      var childRow=document.querySelector('tr[data-id="'+child.id+'"][data-parent="'+uberId+'"]');
      if(childRow){
        var childVisible=false;
        if(showUber&&expanded[uberId]){
          if(!hasFilter||uberMatch) childVisible=true;
          else childVisible=itemMatchesFilter(child);
        }
        childRow.classList.toggle('hid',!childVisible);
        if(childVisible) vis++;
      }
    });
  });
  document.getElementById('nr').style.display=vis?'none':'';
}

function passTile(item){
  if(!activeTile)return true;
  switch(activeTile){
    case 'total':return item.type==='Feature';
    case 'green':return shipColor(item)==='Green';
    case 'orange':return shipColor(item)==='Orange';
    case 'red':return shipColor(item)==='Red';
    case 'gray':return !shipColor(item);
    case 'blocked':return gv(item,'state')==='Blocked';
    case 'stale':return(gv(item,'risks')||'').includes('stale');
    case 'r0miss':return(gv(item,'risks')||'').includes('r0-missing');
    case 'r0over':return(gv(item,'risks')||'').includes('r0-overdue');
  }
  return true;
}

function clearAllFilters(){
  activeTile=null;
  document.getElementById('searchBox').value='';
  document.getElementById('areaSelect').value='';
  renderTiles();applyFilters();
}

// --- Header ---
function renderHdr(){
  var toggleTh='<th class="toggle-col"></th>';
  document.getElementById('hdr').innerHTML=toggleTh+COLS.map(function(c){
    var cls=sortK===c.k?' sorted':'';
    if(c.k==='title') cls+=' title-col';
    var arrow=c.sort?'<span class="sa">'+(sortK===c.k?(sortD===1?'\u25B2':'\u25BC'):'\u21C5')+'</span>':'';
    return '<th class="'+cls+'"'+(c.sort?' onclick="doSort(\''+c.k+'\')"':'')+'>'+c.l+arrow+'</th>';
  }).join('');
}

// --- Sort ---
function doSort(k){
  if(sortK===k)sortD*=-1;else{sortK=k;sortD=1}
  renderHdr();
  uberIds.sort(function(a,b){
    var ia=itemMap[a],ib=itemMap[b];
    if(!ia||!ib) return 0;
    return cmpItems(ia,ib,k);
  });
  uberIds.forEach(function(uid){
    if(childMap[uid]) childMap[uid].sort(function(a,b){
      var ia=itemMap[a],ib=itemMap[b];
      if(!ia||!ib) return 0;
      return cmpItems(ia,ib,k);
    });
  });
  renderRows();
}

function cmpItems(a,b,k){
  var va,vb;
  if(k==='_risk'){
    var order={Green:0,Orange:1,Red:2};
    va=shipColor(a)?(order[shipColor(a)]!==undefined?order[shipColor(a)]:3):3;
    vb=shipColor(b)?(order[shipColor(b)]!==undefined?order[shipColor(b)]:3):3;
  }else{va=gv(a,k);vb=gv(b,k)}
  if(va==null)va='';if(vb==null)vb='';
  if(typeof va==='number'&&typeof vb==='number')return(va-vb)*sortD;
  return String(va).localeCompare(String(vb),undefined,{numeric:true})*sortD;
}

// --- Render rows (hierarchical tree) ---
function renderRows(){
  var tb=document.getElementById('tbody');
  tb.innerHTML='';
  uberIds.forEach(function(uberId){
    var uber=itemMap[uberId];
    if(!uber) return;
    var children=(childMap[uberId]||[]).map(function(cid){return itemMap[cid]}).filter(Boolean);
    tb.appendChild(mkUberRow(uber,children.length));
    if(expanded[uberId]){
      children.forEach(function(child,idx){
        tb.appendChild(mkChildRow(child,uberId,idx===children.length-1));
      });
    }
  });
  applyFilters();
  updateToggleBtn();
}

function mkUberRow(item,childCount){
  var tr=document.createElement('tr');
  tr.dataset.uber=item.id;
  tr.dataset.id=item.id;
  tr.className='uber-row'+(mods[item.id]?' mod':'');
  var isExp=expanded[item.id];
  // Toggle column (separate first column)
  var toggleTd=document.createElement('td');
  toggleTd.className='toggle-col';
  toggleTd.innerHTML='<span class="toggle-btn" onclick="event.stopPropagation();toggleUber('+item.id+')">'+(isExp?'\u25BC':'\u25B6')+'</span>';
  tr.appendChild(toggleTd);
  COLS.forEach(function(col){
    var td=document.createElement('td');
    if(col.k==='title'){
      td.classList.add('tc');
      var badge='<span class="child-badge">'+childCount+' item'+(childCount!==1?'s':'')+'</span>';
      td.innerHTML=cell(item,col)+badge;
    }else if(col.k==='type'){
      td.innerHTML='<span class="type-badge '+(item.type||'')+'">'+esc(item.type||'')+'</span>';
    }else{
      td.innerHTML=cell(item,col);
      if(col.k==='statusTweet') td.classList.add('tw');
    }
    tr.appendChild(td);
  });
  tr.style.cursor='pointer';
  tr.addEventListener('click',function(e){
    if(!e.target.closest('.ed')&&!e.target.closest('.toggle-btn')&&!e.target.closest('a'))
      toggleUber(item.id);
  });
  return tr;
}

function mkChildRow(item,parentId,isLast){
  var tr=document.createElement('tr');
  tr.dataset.id=item.id;
  tr.dataset.parent=parentId;
  tr.className='child-row'+(mods[item.id]?' mod':'');
  // Empty toggle column for child rows
  var emptyTd=document.createElement('td');
  emptyTd.className='toggle-col';
  tr.appendChild(emptyTd);
  COLS.forEach(function(col){
    var td=document.createElement('td');
    if(col.k==='title'){
      td.classList.add('tc');
      var connector=isLast?'\u2514\u2500':'\u251C\u2500';
      td.innerHTML='<span class="tree-indent">'+connector+'</span>'+cell(item,col);
    }else if(col.k==='type'){
      td.innerHTML='<span class="type-badge '+(item.type||'')+'">'+esc(item.type||'')+'</span>';
    }else{
      td.innerHTML=cell(item,col);
      if(col.k==='statusTweet') td.classList.add('tw');
    }
    tr.appendChild(td);
  });
  return tr;
}

function cell(item,col){
  var v=gv(item,col.k);
  switch(col.k){
    case '_risk':{
      var sc=shipColor(item);
      if(sc==='Green')return '<span class="sd Green" title="Green"></span>';
      if(sc==='Orange')return '<span class="sd Orange" title="Orange"></span>';
      if(sc==='Red')return '<span class="sd Red" title="Red"></span>';
      return '<span class="sd Gray" title="No status"></span>';
    }
    case 'id':return '<a href="'+ADO+item.id+'" target="_blank" title="Open in ADO">'+item.id+'</a>';
    case 'title':return col.ed?edWrap(item,col,esc(v||'')):esc(v||'');
    case 'type':return '<span class="type-badge '+(v||'')+'">'+esc(v||'')+'</span>';
    case 'state':{
      var h='<span class="sb '+(v||'')+'">'+(v||'\u2014')+'</span>';
      return col.ed?edWrap(item,col,h):h;
    }
    case 'priority':{
      var c=v==1?'p1':v==2?'p2':'p3';
      var h='<span class="pb '+c+'">P'+(v||'?')+'</span>';
      return col.ed?edWrap(item,col,h):h;
    }
    case 'committed':{
      var c2=(v||'').replace(/\s/g,'');
      var h='<span class="cb '+c2+'">'+(v||'\u2014')+'</span>';
      return col.ed?edWrap(item,col,h):h;
    }
    case 'shiproom':return v?'<span class="sd '+v+'" title="'+v+'"></span>':'\u2014';
    case 'assignedTo':return col.ed?edWrap(item,col,esc(v||'\u2014')):esc(v||'\u2014');
    case 'r0Date':case 'r4Date':{
      var cls='dc';
      if(col.k==='r0Date'&&!v)cls+=' missing';
      else if(v&&new Date(v)<new Date())cls+=' overdue';
      var txt=v||'\u26A0 missing';
      var h='<span class="'+cls+'">'+txt+'</span>';
      return col.ed?edWrap(item,col,h):h;
    }
    case 'daysSinceUpdate':{
      var d=v||0;
      var c3=d>=14?'crit':d>=7?'warn':'ok';
      return '<span class="db '+c3+'">'+d+'d</span>';
    }
    case 'statusTweet':{
      var raw=v||'';
      var short=esc(raw.length>60?raw.slice(0,60)+'\u2026':raw)||'\u2014';
      var full=raw?'<div class="tw-full">'+esc(raw)+'</div>':'';
      return col.ed?edWrap(item,col,short)+full:short+full;
    }
    case 'risks':{
      var r=v||'';
      if(!r)return '<span style="opacity:.4">\u2014</span>';
      return r.split(',').filter(Boolean).map(function(t){return '<span class="rt '+t+'">'+t+'</span>'}).join(' ');
    }
    case 'areaPath':{
      var parts=(v||'').split('\\');
      return '<span title="'+esc(v||'')+'">'+esc(parts[parts.length-1]||'\u2014')+'</span>';
    }
  }
  return esc(String(v!=null?v:''));
}

function edWrap(item,col,html){
  return '<span class="ed" onclick="startEd(event,'+item.id+',\''+col.k+'\',\''+(col.ed||'text')+'\')" title="Click to edit">'+html+'</span>';
}

// --- Inline Editing ---
function startEd(ev,id,field,type){
  ev.stopPropagation();
  var span=ev.currentTarget;
  if(span.querySelector('.ei'))return;
  var item=itemMap[id];
  if(!item)return;
  var cur=String(gv(item,field)||'');
  var col=COLS.find(function(c){return c.k===field});
  var inp;
  if(type==='select'){
    inp=document.createElement('select');
    inp.className='ei';
    (col.opts||[]).forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;if(o===cur)op.selected=true;inp.appendChild(op)});
  }else if(type==='date'){
    inp=document.createElement('input');inp.type='date';inp.className='ei';inp.value=cur;
  }else if(type==='textarea'){
    inp=document.createElement('textarea');inp.className='ei';inp.value=cur;inp.rows=3;
  }else{
    inp=document.createElement('input');inp.type='text';inp.className='ei';inp.value=cur;
  }
  span.innerHTML='';span.appendChild(inp);inp.focus();
  if(inp.select&&type!=='select')inp.select();
  var commit=function(){
    var nv=inp.value;
    if(nv!==cur){
      if(!mods[id])mods[id]={};
      mods[id][field]=field==='priority'?parseInt(nv):nv;
      updSave();
    }
    renderRows();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&type!=='textarea'){e.preventDefault();inp.blur()}
    if(e.key==='Escape'){inp.value=cur;inp.blur()}
  });
}

// --- Save ---
function updSave(){
  var n=Object.keys(mods).length;
  var btn=document.getElementById('saveBtn');
  btn.style.display=n?'inline-flex':'none';
  document.getElementById('saveBadge').textContent=n;
}

function saveChanges(){
  var n=Object.keys(mods).length;
  Object.entries(mods).forEach(function(entry){
    var item=itemMap[+entry[0]];
    if(item) Object.assign(item,entry[1]);
  });
  mods={};updSave();renderTiles();renderRows();
  toast('\u2705 '+n+' item'+(n!==1?'s':'')+' saved locally');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
